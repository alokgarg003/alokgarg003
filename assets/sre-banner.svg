<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#132238"/>
      <stop offset="1" stop-color="#1C3552"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="42" x2="396" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="92" r="132" fill="#7DD3FC" fill-opacity="0.08"/>
  <circle cx="1198" cy="256" r="96" fill="#34D399" fill-opacity="0.08"/>
  <circle cx="86" cy="316" r="120" fill="#38BDF8" fill-opacity="0.05"/>

  <rect x="72" y="54" width="324" height="44" rx="22" fill="#08101D" fill-opacity="0.72" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="96" y="82" fill="#DFF7FF" font-family="Verdana, Segoe UI, sans-serif" font-size="18" font-weight="700">PRODUCTION RELIABILITY ENGINEER</text>

  <text x="72" y="154" fill="#F8FAFC" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="54" font-weight="700">Alok Garg</text>
  <text x="72" y="198" fill="#9BD7FF" font-family="Verdana, Segoe UI, sans-serif" font-size="26" font-weight="600">Incident Response • Linux Operations • RCA • Automation</text>
  <text x="72" y="238" fill="#CBD5E1" font-family="Verdana, Segoe UI, sans-serif" font-size="22">Building trust in systems through calm debugging, cleaner alerting,</text>
  <text x="72" y="270" fill="#CBD5E1" font-family="Verdana, Segoe UI, sans-serif" font-size="22">and practical engineering for production environments.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="296" width="158" height="34" rx="17" fill="#0F1B2C" stroke="#334155"/>
    <text x="104" y="318" fill="#E2E8F0" font-family="Verdana, Segoe UI, sans-serif" font-size="15" font-weight="600">SRE</text>

    <rect x="244" y="296" width="196" height="34" rx="17" fill="#0F1B2C" stroke="#334155"/>
    <text x="276" y="318" fill="#E2E8F0" font-family="Verdana, Segoe UI, sans-serif" font-size="15" font-weight="600">Production Support</text>

    <rect x="454" y="296" width="176" height="34" rx="17" fill="#0F1B2C" stroke="#334155"/>
    <text x="486" y="318" fill="#E2E8F0" font-family="Verdana, Segoe UI, sans-serif" font-size="15" font-weight="600">Root Cause Analysis</text>

    <rect x="644" y="296" width="138" height="34" rx="17" fill="#0F1B2C" stroke="#334155"/>
    <text x="676" y="318" fill="#E2E8F0" font-family="Verdana, Segoe UI, sans-serif" font-size="15" font-weight="600">Automation</text>
